name: deploy-server

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH into DigitalOcean droplet & deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /root/nomadic-server-v2
            echo ">>> Fetching latest code from GitHub"
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            echo ">>> Installing dependencies"
            npm install --no-audit --no-fund
            echo ">>> Restarting app with pm2"
            pm2 restart nomadic-server --update-env
            pm2 save
            echo ">>> Deployed:"
            git log -1 --oneline
            pm2 list
