name: nomadic-cicd
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  IMAGE_NAME: docker.io/mudasar1234/nomadic-server  # full path, lowercase
  RUNTIME_PORT: "5000"
  PUBLIC_PORT:  "80"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Docker Hub login (explicit)
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Sanity push test to your repo (alpine)
        run: |
          docker pull alpine:3.20
          docker tag alpine:3.20 ${{ env.IMAGE_NAME }}:can-push
          docker push ${{ env.IMAGE_NAME }}:can-push

      - name: Compute tags
        id: vars
        run: echo "SHA_TAG=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build & Push app (sha + latest)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.SHA_TAG }}
            ${{ env.IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: SSH into EC2 & deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SERVER_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            IMAGE="${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.SHA_TAG || 'latest' }}"
            NAME="nomadic"
            PORT_OUT=${{ env.PUBLIC_PORT }}
            PORT_IN=${{ env.RUNTIME_PORT }}
            ENV_FILE="/home/ubuntu/nomadic/.env"
            sudo systemctl enable --now docker
            # login only if your Hub repo is private (optional):x
            # echo "${{ secrets.DOCKER_PASS }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin
            docker pull "$IMAGE"
            docker rm -f "$NAME" 2>/dev/null || true
            docker run -d --name "$NAME" --restart unless-stopped \
              --env-file "$ENV_FILE" -p 127.0.0.1:${PORT_IN}:${PORT_IN} "$IMAGE"
            docker ps --filter "name=$NAME"
